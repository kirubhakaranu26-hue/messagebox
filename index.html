<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Character Counter</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
<div class="card">
<h1>Message</h1>
<p class="limit">Maximum 200 characters</p>
<textarea id="message" rows="6" maxlength="200" placeholder="Type your message here..."></textarea>
<div class="counter-box">
<span id="counter">0 / 200</span>
<span id="remaining">200 remaining</span>
</div>
<p id="warning"></p>
</div>
</div>
<script src="script.js"></script>
</body>
</html>
